<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Чат с RAG</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #f5f6f8; }
    .container { max-width: 820px; margin: 0 auto; padding: 24px; }
    .chat-box { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; height: 60vh; overflow-y: auto; padding: 16px; }
    .message { margin: 10px 0; display: flex; }
    .message .bubble { max-width: 70%; padding: 10px 14px; border-radius: 12px; line-height: 1.4; }
    .message.user { justify-content: flex-end; }
    .message.user .bubble { background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
    .message.bot .bubble { background: #f3f4f6; color: #111827; border-bottom-left-radius: 4px; }
    .input-row { display: flex; gap: 8px; margin-top: 12px; }
    input[type="text"] { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #d1d5db; font-size: 16px; }
    button { padding: 12px 16px; border: none; border-radius: 10px; background: #10b981; color: #fff; font-weight: 600; cursor: pointer; }
    button:disabled { background: #9ca3af; cursor: default; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Чат</h2>
    <div id="chat" class="chat-box"></div>
    <div class="input-row">
      <input id="msg" type="text" placeholder="Введите сообщение..." />
      <button id="send">Отправить</button>
    </div>
  </div>
  <script>
    const chat = document.getElementById('chat');
    const msgInput = document.getElementById('msg');
    const sendBtn = document.getElementById('send');

    function addMessage(text, who) {
      const row = document.createElement('div');
      row.className = `message ${who}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    async function pollUpdates() {
      try {
        const res = await fetch('/chat/updates');
        const data = await res.json();
        if (data && data.ok && Array.isArray(data.updates)) {
          data.updates.forEach(u => {
            const text = (u && u.answer) ? `Ответ оператора: ${u.answer}` : 'Ответ оператора';
            addMessage(text, 'bot');
          });
        }
      } catch (e) {
      }
    }

    async function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      msgInput.value = '';
      sendBtn.disabled = true;
      try {
        const res = await fetch('/chat/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        if (!data.ok) {
          addMessage(data.error || 'Ошибка', 'bot');
        } else {
          addMessage(data.answer || '', 'bot');
        }
      } catch (e) {
        addMessage('Ошибка сети', 'bot');
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    setInterval(pollUpdates, 3000);
    pollUpdates();
  </script>
</body>
</html>
