<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2048</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
    }
    h1 { font-size: 1.25rem; margin-bottom: 4px; }
    .score-row {
      display: flex;
      gap: 8px;
      margin: 8px 0 12px;
      width: 100%;
      max-width: 320px;
    }
    .score-box {
      flex: 1;
      background: #1e293b;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }
    .score-box span { display: block; font-size: 0.7rem; color: #94a3b8; }
    .score-box strong { font-size: 1.1rem; }
    #board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1;
      background: #1e293b;
      border-radius: 12px;
      padding: 8px;
    }
    .cell {
      background: #334155;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: clamp(0.75rem, 4vw, 1.25rem);
    }
    .cell.v-2 { background: #6366f1; color: #fff; }
    .cell.v-4 { background: #818cf8; color: #fff; }
    .cell.v-8 { background: #a78bfa; color: #fff; }
    .cell.v-16 { background: #c084fc; color: #fff; }
    .cell.v-32 { background: #e879f9; color: #fff; }
    .cell.v-64 { background: #f472b6; color: #fff; }
    .cell.v-128 { background: #fb7185; font-size: 0.9rem; }
    .cell.v-256 { background: #f97316; }
    .cell.v-512 { background: #eab308; color: #0f172a; }
    .cell.v-1024 { background: #22c55e; color: #0f172a; font-size: 0.75rem; }
    .cell.v-2048 { background: #facc15; color: #0f172a; font-size: 0.7rem; }
    .hint { margin-top: 10px; font-size: 0.75rem; color: #64748b; text-align: center; }
    button {
      margin-top: 10px;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { transform: scale(0.98); }
    #status { min-height: 1.2em; margin-top: 6px; font-size: 0.85rem; color: #a5b4fc; }
  </style>
</head>
<body>
  <h1>2048</h1>
  <div class="score-row">
    <div class="score-box"><span>Счёт</span><strong id="score">0</strong></div>
    <div class="score-box"><span>Лучший</span><strong id="best">0</strong></div>
  </div>
  <div id="board"></div>
  <p id="status"></p>
  <button type="button" id="restart">Новая игра</button>
  <p class="hint">Стрелки или свайп · соберите 2048</p>
  <script>
    (function () {
      var SIZE = 4;
      var grid = [];
      var score = 0;
      var best = 0;
      try {
        best = parseInt(localStorage.getItem('vondic_2048_best') || '0', 10) || 0;
      } catch (e) {}
      var boardEl = document.getElementById('board');
      var scoreEl = document.getElementById('score');
      var bestEl = document.getElementById('best');
      var statusEl = document.getElementById('status');

      function emptyGrid() {
        var g = [];
        for (var r = 0; r < SIZE; r++) {
          g[r] = [];
          for (var c = 0; c < SIZE; c++) g[r][c] = 0;
        }
        return g;
      }

      function randCell() {
        var empty = [];
        for (var r = 0; r < SIZE; r++) {
          for (var c = 0; c < SIZE; c++) {
            if (!grid[r][c]) empty.push({ r: r, c: c });
          }
        }
        if (!empty.length) return;
        var pick = empty[Math.floor(Math.random() * empty.length)];
        grid[pick.r][pick.c] = Math.random() < 0.9 ? 2 : 4;
      }

      function render() {
        boardEl.textContent = '';
        for (var r = 0; r < SIZE; r++) {
          for (var c = 0; c < SIZE; c++) {
            var v = grid[r][c];
            var cell = document.createElement('div');
            cell.className = 'cell' + (v ? ' v-' + v : '');
            cell.textContent = v ? String(v) : '';
            boardEl.appendChild(cell);
          }
        }
        scoreEl.textContent = String(score);
        bestEl.textContent = String(best);
      }

      function slideLine(line) {
        var arr = line.filter(function (x) { return x; });
        var merged = [];
        var gained = 0;
        var i = 0;
        while (i < arr.length) {
          if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
            var nv = arr[i] * 2;
            merged.push(nv);
            gained += nv;
            i += 2;
          } else {
            merged.push(arr[i]);
            i += 1;
          }
        }
        while (merged.length < SIZE) merged.push(0);
        return { line: merged, gained: gained };
      }

      function move(dir) {
        var moved = false;
        var add = 0;
        var nr = emptyGrid();
        if (dir === 'left' || dir === 'right') {
          for (var r = 0; r < SIZE; r++) {
            var line = [];
            for (var c = 0; c < SIZE; c++) {
              line.push(dir === 'left' ? grid[r][c] : grid[r][SIZE - 1 - c]);
            }
            var res = slideLine(line);
            add += res.gained;
            for (var c2 = 0; c2 < SIZE; c2++) {
              var val = dir === 'left' ? res.line[c2] : res.line[SIZE - 1 - c2];
              if (grid[r][c2] !== val) moved = true;
              nr[r][c2] = val;
            }
          }
        } else {
          for (var c3 = 0; c3 < SIZE; c3++) {
            var col = [];
            for (var r2 = 0; r2 < SIZE; r2++) {
              col.push(dir === 'up' ? grid[r2][c3] : grid[SIZE - 1 - r2][c3]);
            }
            var res2 = slideLine(col);
            add += res2.gained;
            for (var r3 = 0; r3 < SIZE; r3++) {
              var val2 = dir === 'up' ? res2.line[r3] : res2.line[SIZE - 1 - r3];
              if (grid[r3][c3] !== val2) moved = true;
              nr[r3][c3] = val2;
            }
          }
        }
        if (!moved) return false;
        grid = nr;
        score += add;
        if (score > best) {
          best = score;
          try { localStorage.setItem('vondic_2048_best', String(best)); } catch (e) {}
        }
        randCell();
        render();
        checkEnd();
        return true;
      }

      function canMove() {
        for (var r = 0; r < SIZE; r++) {
          for (var c = 0; c < SIZE; c++) {
            if (!grid[r][c]) return true;
            if (c + 1 < SIZE && grid[r][c] === grid[r][c + 1]) return true;
            if (r + 1 < SIZE && grid[r][c] === grid[r + 1][c]) return true;
          }
        }
        return false;
      }

      function checkEnd() {
        for (var r = 0; r < SIZE; r++) {
          for (var c = 0; c < SIZE; c++) {
            if (grid[r][c] === 2048) {
              statusEl.textContent = 'Победа! Можно продолжать.';
              return;
            }
          }
        }
        if (!canMove()) statusEl.textContent = 'Игра окончена. Нажмите «Новая игра».';
        else statusEl.textContent = '';
      }

      function newGame() {
        grid = emptyGrid();
        score = 0;
        statusEl.textContent = '';
        randCell();
        randCell();
        render();
      }

      document.getElementById('restart').addEventListener('click', newGame);

      document.addEventListener('keydown', function (e) {
        var map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
        if (map[e.key]) {
          e.preventDefault();
          move(map[e.key]);
        }
      });

      var touchStart = null;
      document.addEventListener('touchstart', function (e) {
        if (e.touches.length === 1) {
          touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
      }, { passive: true });
      document.addEventListener('touchend', function (e) {
        if (!touchStart || !e.changedTouches.length) return;
        var dx = e.changedTouches[0].clientX - touchStart.x;
        var dy = e.changedTouches[0].clientY - touchStart.y;
        touchStart = null;
        if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
        if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
        else move(dy > 0 ? 'down' : 'up');
      }, { passive: true });

      newGame();
    })();
  </script>
</body>
</html>
