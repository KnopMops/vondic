<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div class="app">
			<div class="header">🎨 Вондик - Кастомизация</div>
			
			<div class="section">
				<div class="section-title">Тема оформления</div>
				<label class="toggle-field">
					<span>Тёмная тема</span>
					<input id="darkTheme" type="checkbox" />
				</label>
				<label class="toggle-field">
					<span>Компактный режим</span>
					<input id="compactMode" type="checkbox" />
				</label>
			</div>
			
			<div class="section">
				<div class="section-title">Цвета</div>
				<label class="field">
					<span>Основной цвет</span>
					<input id="primaryColor" type="color" value="#4f46e5" />
				</label>
				<label class="field">
					<span>Цвет акцента</span>
					<input id="accentColor" type="color" value="#ec4899" />
				</label>
			</div>
			
			<div class="section">
				<div class="section-title">Шрифт</div>
				<label class="field">
					<span>Размер шрифта</span>
					<input id="fontSize" type="range" min="12" max="20" value="14" />
					<span id="fontSizeValue">14px</span>
				</label>
			</div>
			
			<div class="section">
				<div class="section-title">Интерфейс</div>
				<label class="toggle-field">
					<span>Скрыть аватарки</span>
					<input id="hideAvatars" type="checkbox" />
				</label>
				<label class="toggle-field">
					<span>Скрыть уведомления</span>
					<input id="hideNotifications" type="checkbox" />
				</label>
			</div>
			
			<button id="apply" class="btn">Применить</button>
			<button id="reset" class="btn btn-secondary">Сбросить</button>
			<div id="status" class="status"></div>
		</div>
		<script src="popup.js"></script>
	</body>
</html>
