<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div class="app">
			<div class="header">Proxy Receiver</div>
			<label class="row">
				<span>Включено</span>
				<input id="enabled" type="checkbox" />
			</label>
			<label class="field">
				<span>Хост</span>
				<input id="host" type="text" placeholder="127.0.0.1" />
			</label>
			<label class="field">
				<span>Порт</span>
				<input id="port" type="number" min="1" max="65535" placeholder="9000" />
			</label>
			<label class="field">
				<span>API ключ</span>
				<input id="apiKey" type="password" placeholder="apikey" />
			</label>
			<label class="field">
				<span>Домены</span>
				<textarea
					id="domains"
					rows="3"
					placeholder="example.com, api.example.com"
				></textarea>
			</label>
			<button id="save" class="btn">Сохранить</button>
			<div id="status" class="status"></div>
		</div>
		<script src="popup.js"></script>
	</body>
</html>
