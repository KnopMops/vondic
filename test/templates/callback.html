<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>OAuth Callback</title>
  </head>
  <body>
    <p>Обработка OAuth ответа...</p>
    <script>
      (function () {
        const payload = {
          type: "vondic_oauth_result",
          code: {{ (code|tojson) if code else "null" }},
          state: {{ (state|tojson) if state else "null" }},
          error: {{ (error|tojson) if error else "null" }},
          state_ok: {{ "true" if state_ok else "false" }}
        };

        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(payload, window.location.origin);
          window.close();
          return;
        }

        // Fallback when opened as full page
        (async () => {
          let html = "<h3>OAuth callback received</h3>";
          if (payload.error) {
            html += "<p>Ошибка авторизации: " + String(payload.error) + "</p>";
          } else if (!payload.state_ok) {
            html += "<p>Ошибка: state mismatch (CSRF check failed).</p>";
          } else if (payload.code && payload.state) {
            try {
              const resp = await fetch("/auth/exchange", {
                method: "POST",
                credentials: "include",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ code: payload.code, state: payload.state }),
              });
              const data = await resp.json();
              if (resp.ok) {
                window.location.href = "/";
                return;
              }
              html += "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
            } catch (err) {
              html += "<p>" + String(err) + "</p>";
            }
          } else {
            html += "<pre>" + JSON.stringify(payload, null, 2) + "</pre>";
          }
          html += "<p>Можно закрыть эту страницу.</p>";
          document.body.innerHTML = html;
        })();
      })();
    </script>
  </body>
</html>
